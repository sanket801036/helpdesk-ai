# =========================================================
#  Helpdesk AI — docker-compose (PostgreSQL + Backend)
#  Laptop par bas:  docker-compose up --build
#  DB credentials yahin set hain -> koi "access denied" nahi.
# =========================================================

services:
  db:
    # pgvector image = normal postgres + vector extension (future RAG ke liye ready)
    image: pgvector/pgvector:pg16
    container_name: helpdesk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
      POSTGRES_DB: helpdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 10s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    container_name: helpdesk_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Container ke andar DB ka host = 'db' (service name), localhost nahi
      DATABASE_URL: "postgresql+asyncpg://helpdesk:helpdesk@db:5432/helpdesk"
      APP_ENV: "development"
      DEBUG: "true"
      JWT_SECRET_KEY: "dev_change_me_to_long_random_secret"
      # AI phase me apni HF key yahan daalna:
      # HF_API_KEY: "hf_xxx"
    ports:
      - "8000:8000"
    # Pehle migration chalao, phir server start
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
